services:
  postgres:
    image: pgvector/pgvector:pg16
    # POSTGRES_USER/PASSWORD/DB come from the env files — single source of truth
    # shared with the API's derived DATABASE_URL.
    env_file:
      - .env.defaults
      - path: .env
        required: false
    ports:
      # Bind to loopback only — this is a local-first app with default dev
      # credentials; the DB must not be reachable from the LAN.
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 3s
      timeout: 3s
      retries: 10

  api:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    # App config (Postgres creds, Ollama URL, model, JWT) comes from the env files;
    # the app derives DATABASE_URL from POSTGRES_* (host=postgres from defaults).
    env_file:
      - .env.defaults
      - path: .env
        required: false
    environment:
      # Dev-only wiring, not app config: the entrypoint adds uvicorn --reload when
      # set (see docker-entrypoint.sh). Requires the ./src bind-mount below.
      UVICORN_RELOAD: "1"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      # Bind to loopback only — a local-first app ships a shared dev JWT secret,
      # so exposing the auth endpoints on the LAN means forgeable tokens.
      - "127.0.0.1:8000:8000"
    # Bind-mount the source so host code edits reload without rebuilding. Only
    # ./src is mounted (never the whole repo), so the container's /app/.venv —
    # built for the image's platform — is not shadowed by the host's.
    volumes:
      - ./src:/app/src

  frontend:
    # Run the Vite dev server (from the Dockerfile's node "build" stage) instead
    # of the production nginx image, so edits under ./frontend hot-reload via HMR.
    build:
      context: ./frontend
      target: build
    command: npm run dev -- --host 0.0.0.0 --port 3000
    environment:
      # Inside compose the API is reachable as "api", not localhost (see
      # frontend/vite.config.ts, which proxies /api to this target).
      VITE_API_PROXY_TARGET: http://api:8000
    ports:
      - "3000:3000"
    # Bind-mount the whole frontend for HMR; the anonymous volume keeps the
    # image's node_modules (installed by `npm ci`) from being shadowed.
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - api

volumes:
  pgdata:
