services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: capybara
      POSTGRES_PASSWORD: capybara
      POSTGRES_DB: capybara
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U capybara"]
      interval: 3s
      timeout: 3s
      retries: 10

  api:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://capybara:capybara@postgres:5432/capybara
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      DEFAULT_MODEL: llama3.1
      # Local-first dev default; override with a real secret via the host env
      # or a .env file. Must be >=32 chars (see capybara.config.Settings).
      JWT_SECRET: ${JWT_SECRET:-dev-insecure-jwt-secret-change-me-please}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  pgdata:
