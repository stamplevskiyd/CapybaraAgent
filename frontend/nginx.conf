server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;

  # ── Security headers (defense-in-depth) ──────────────────────────────────────
  # The auth token lives in localStorage, so an XSS would be able to read it. There
  # is no raw-HTML sink today (markdown is sanitized, no dangerouslySetInnerHTML),
  # but this CSP blocks injected inline scripts and constrains where data can go, so
  # a future regression cannot execute arbitrary JS or exfiltrate to a foreign host.
  # 'unsafe-inline' is required only for styles (React inline style attributes +
  # the syntax highlighter). The fonts.googleapis/gstatic allowances disappear once
  # the Google Fonts @import is self-hosted.
  # Inherited by both location blocks below since neither sets its own add_header.
  add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self'; base-uri 'none'; form-action 'self'; frame-ancestors 'none'; object-src 'none'" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "no-referrer" always;

  location /api/ {
    proxy_pass http://api:8000/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_buffering off;                 # required so SSE streams flush
    proxy_set_header Connection '';
    proxy_read_timeout 3600s;
  }

  location / {
    try_files $uri $uri/ /index.html;    # SPA fallback
  }
}
